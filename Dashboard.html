<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VictroX – Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; font-family:'Inter',sans-serif; color:#e0e0e0; padding-bottom:72px; }

  /* TOPBAR */
  .topbar { background:#0d0d12; border-bottom:1px solid #1a1a24; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .topbar-logo { display:flex; align-items:center; gap:8px; }
  .topbar-logo img { width:28px; height:28px; object-fit:contain; }
  .topbar-logo span { font-size:16px; font-weight:700; color:#fff; }
  .topbar-logo span em { color:#cc0000; font-style:normal; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .notif-btn { width:34px; height:34px; border-radius:50%; background:#1a1a24; border:1px solid #252530; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#cc0000,#ff3333); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; border:2px solid #cc0000; }

  /* PAGES */
  .page { display:none; padding:16px; }
  .page.active { display:block; }
  .page-title { font-size:18px; font-weight:700; color:#fff; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

  /* ===== PROFILE PAGE ===== */
  .profile-card { background:#13131e; border:1px solid #1a1a24; border-radius:14px; padding:16px; display:flex; align-items:center; gap:14px; margin-bottom:12px; }
  .profile-avatar { width:68px; height:68px; border-radius:50%; background:linear-gradient(135deg,#cc0000,#ff3333); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; position:relative; flex-shrink:0; border:2px solid #cc000066; }
  .camera-badge { position:absolute; bottom:0; right:0; width:22px; height:22px; border-radius:50%; background:#cc0000; display:flex; align-items:center; justify-content:center; font-size:11px; border:2px solid #0a0a0f; cursor:pointer; }
  .profile-info h2 { font-size:17px; font-weight:700; color:#fff; margin-bottom:3px; }
  .profile-info p { font-size:12px; color:#555; margin-bottom:8px; }
  .unranked-badge { display:inline-flex; align-items:center; gap:4px; background:#1a1a24; border:1px solid #252530; color:#aaa; padding:4px 12px; border-radius:20px; font-size:12px; }
  .guest-badge { display:inline-flex; align-items:center; gap:4px; background:#1a0a0a; border:1px solid #cc000044; color:#cc0000; padding:4px 12px; border-radius:20px; font-size:12px; }

  .premium-banner { background:linear-gradient(135deg,#1a0a0a,#2a0a0a); border:1px solid #cc000044; border-radius:14px; padding:16px; display:flex; align-items:center; gap:14px; margin-bottom:12px; cursor:pointer; }
  .premium-icon { width:46px; height:46px; border-radius:12px; background:#cc000022; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .premium-info { flex:1; }
  .premium-info h3 { font-size:15px; font-weight:700; color:#fff; margin-bottom:2px; }
  .premium-info p { font-size:12px; color:#888; }
  .upgrade-btn { background:#cc0000; color:#fff; border:none; padding:9px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }

  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
  .stat-box { background:#13131e; border:1px solid #1a1a24; border-radius:12px; padding:18px 16px; text-align:center; }
  .stat-box .num { font-size:26px; font-weight:700; color:#cc0000; margin-bottom:4px; }
  .stat-box .lbl { font-size:11px; color:#555; text-transform:uppercase; letter-spacing:.5px; }

  .settings-card { background:#13131e; border:1px solid #1a1a24; border-radius:14px; overflow:hidden; }
  .settings-label { font-size:11px; color:#555; text-transform:uppercase; letter-spacing:.5px; padding:14px 16px 8px; }
  .settings-item { display:flex; align-items:center; gap:12px; padding:15px 16px; border-bottom:1px solid #0f0f18; cursor:pointer; transition:background .2s; }
  .settings-item:last-child { border-bottom:none; }
  .settings-item:hover { background:#16161f; }
  .settings-icon { font-size:18px; width:26px; text-align:center; }
  .settings-text { flex:1; font-size:14px; color:#ccc; font-weight:500; }
  .settings-arrow { color:#2a2a3a; font-size:18px; }
  .premium-tag { background:#cc000022; color:#cc0000; border:1px solid #cc000044; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; margin-right:6px; }
  .signout { color:#cc0000 !important; }

  /* ===== RULES ===== */
  .rules-card { background:#13131e; border:1px solid #1a1a24; border-radius:14px; padding:18px; margin-bottom:12px; }
  .rules-card h3 { font-size:14px; font-weight:700; color:#cc0000; margin-bottom:12px; }
  .rules-card li { font-size:13px; color:#888; margin-bottom:8px; list-style:none; line-height:1.5; }
  .rules-card li::before { content:"• "; color:#cc0000; font-weight:700; }

  /* ===== WALLET ===== */
  .wallet-card { background:linear-gradient(135deg,#13131e,#1a1020); border:1px solid #1a1a24; border-radius:16px; padding:22px; margin-bottom:16px; }
  .wallet-label { font-size:11px; color:#555; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
  .wallet-coin-icon { font-size:22px; }
  .wallet-balance { font-size:42px; font-weight:700; color:#fff; margin-bottom:4px; }
  .wallet-sub { font-size:13px; color:#555; margin-bottom:18px; }
  .wallet-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .wallet-btn { background:#1a1a24; border:1px solid #252530; color:#ccc; padding:13px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; }
  .wallet-btn:hover { border-color:#cc0000; color:#fff; }
  .tx-section-label { font-size:11px; color:#555; text-transform:uppercase; letter-spacing:.5px; margin-bottom:14px; }
  .no-tx { text-align:center; padding:44px 0; background:#13131e; border:1px solid #1a1a24; border-radius:14px; }
  .no-tx .icon { font-size:36px; margin-bottom:10px; opacity:.3; }
  .no-tx p { font-size:13px; color:#444; }

  /* ===== CHAT ===== */
  .chat-list { display:grid; gap:10px; }
  .chat-item { background:#13131e; border:1px solid #1a1a24; border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:border-color .2s; }
  .chat-item:hover { border-color:#cc000044; }
  .chat-avatar { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; flex-shrink:0; }
  .chat-info { flex:1; }
  .chat-name { font-size:14px; font-weight:600; color:#fff; margin-bottom:3px; }
  .chat-last { font-size:12px; color:#555; }
  .chat-time { font-size:11px; color:#444; white-space:nowrap; }

  /* ===== EVENTS ===== */
  .filter-tabs { display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; }
  .filter-tab { padding:8px 18px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; border:1px solid #1a1a24; background:#13131e; color:#555; transition:all .2s; flex-shrink:0; }
  .filter-tab.active { background:#cc0000; color:#fff; border-color:#cc0000; }
  .tournament-card { background:#13131e; border:1px solid #1a1a24; border-radius:14px; padding:16px; margin-bottom:12px; }
  .tournament-card.registered { border-color:#00c453; }
  .t-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; }
  .t-name { font-size:15px; font-weight:700; color:#fff; }
  .t-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; flex-shrink:0; margin-left:8px; }
  .t-badge.live { background:#cc000022; color:#ff4444; border:1px solid #cc000044; }
  .t-badge.upcoming { background:#1a1a24; color:#aaa; border:1px solid #252530; }
  .t-game { font-size:12px; color:#555; margin-bottom:10px; }
  .t-info { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
  .t-info span { font-size:12px; color:#888; }
  .registered-text { font-size:13px; color:#00c453; font-weight:600; margin-bottom:10px; }
  .join-btn { width:100%; background:#cc0000; border:none; color:#fff; padding:11px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; margin-bottom:8px; }
  .report-btn { width:100%; background:#1a0a0a; border:1px solid #cc000033; color:#cc0000; padding:10px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px; }

  /* ===== SUPPORT ===== */
  .support-chat { background:#13131e; border:1px solid #1a1a24; border-radius:14px; overflow:hidden; margin-bottom:12px; }
  .support-messages { padding:16px; min-height:320px; max-height:420px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .msg { display:flex; gap:8px; align-items:flex-end; }
  .msg.user { flex-direction:row-reverse; }
  .msg-avatar { width:28px; height:28px; border-radius:50%; background:#1a1a24; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .msg-bubble { max-width:72%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
  .msg.bot .msg-bubble { background:#1a1a24; color:#ccc; border-radius:4px 12px 12px 12px; }
  .msg.user .msg-bubble { background:#cc0000; color:#fff; border-radius:12px 4px 12px 12px; }
  .support-input { display:flex; gap:8px; padding:12px 14px; border-top:1px solid #1a1a24; }
  .support-input input { flex:1; background:#111; border:1px solid #1f1f1f; border-radius:8px; padding:10px 14px; color:#f0f0f0; font-size:13px; font-family:'Inter',sans-serif; outline:none; }
  .support-input input:focus { border-color:#cc0000; }
  .send-btn { width:40px; height:40px; border-radius:50%; background:#cc0000; border:none; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .admin-contact-box { background:#13131e; border:1px solid #1a1a24; border-radius:14px; padding:18px; text-align:center; }
  .admin-contact-box p { font-size:13px; color:#555; margin-bottom:12px; line-height:1.6; }
  .contact-admin-btn { background:transparent; border:1px solid #cc000044; color:#cc0000; padding:10px 28px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }

  /* LOCKED POPUP */
  .locked-popup { display:none; position:fixed; inset:0; background:#000000bb; z-index:200; align-items:center; justify-content:center; padding:24px; }
  .locked-popup.show { display:flex; }
  .locked-box { background:#0d0d0d; border:1px solid #cc000044; border-radius:16px; padding:28px 24px; max-width:320px; width:100%; text-align:center; }
  .locked-box .licon { font-size:40px; margin-bottom:12px; }
  .locked-box h3 { font-size:16px; font-weight:700; color:#fff; margin-bottom:8px; }
  .locked-box p { font-size:13px; color:#666; margin-bottom:20px; line-height:1.6; }
  .locked-btns { display:grid; gap:10px; }
  .btn-create-acc { background:linear-gradient(90deg,#cc0000,#ff3333); color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-close-locked { background:transparent; color:#555; border:1px solid #1f1f1f; border-radius:10px; padding:12px; font-size:14px; cursor:pointer; font-family:'Inter',sans-serif; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#0d0d12; border-top:1px solid #1a1a24; display:flex; z-index:50; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 4px 8px; cursor:pointer; color:#444; font-size:10px; font-weight:500; gap:3px; transition:color .2s; border:none; background:none; font-family:'Inter',sans-serif; }
  .nav-btn .nav-icon { font-size:20px; }
  .nav-btn.active { color:#cc0000; }
</style>
</head>
