<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VictroX – About</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Inter',sans-serif; color:#e0e0e0; }

  nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:#0d0d0d; border-bottom:1px solid #1a1a1a; position:sticky; top:0; z-index:50; }
  .nav-logo { display:flex; align-items:center; gap:10px; }
  .nav-logo img { width:34px; height:34px; object-fit:contain; }
  .nav-logo span { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; color:#fff; }
  .nav-logo span em { color:#cc0000; font-style:normal; }
  .nav-links { display:flex; gap:6px; }
  .nav-links a { color:#555; text-decoration:none; font-size:13px; font-weight:500; padding:7px 14px; border-radius:8px; transition:color .2s, background .2s; }
  .nav-links a:hover { color:#fff; background:#1a1a1a; }
  .nav-links a.active { color:#cc0000; }
  .btn-nav { background:#cc0000; color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }

  .hero { text-align:center; padding:60px 24px 40px; background-image:radial-gradient(ellipse 70% 40% at 50% 0%, #cc000015 0%, transparent 60%); }
  .hero img { width:100px; height:100px; object-fit:contain; margin-bottom:16px; }
  .hero h1 { font-family:'Rajdhani',sans-serif; font-size:clamp(32px,7vw,56px); font-weight:700; color:#fff; margin-bottom:12px; line-height:1.1; }
  .hero h1 span { color:#cc0000; }
  .hero p { color:#555; font-size:14px; max-width:480px; margin:0 auto 28px; line-height:1.7; }
  .hero-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn-primary { background:linear-gradient(90deg,#cc0000,#ff3333); color:#fff; border:none; padding:12px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-outline { background:transparent; color:#ccc; border:1px solid #222; padding:12px 28px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }

  .stats { display:flex; justify-content:center; background:#0d0d0d; border-top:1px solid #1a1a1a; border-bottom:1px solid #1a1a1a; flex-wrap:wrap; }
  .stat { text-align:center; padding:24px 36px; border-right:1px solid #1a1a1a; flex:1; min-width:120px; }
  .stat:last-child { border-right:none; }
  .stat-num { font-family:'Rajdhani',sans-serif; font-size:30px; font-weight:700; color:#cc0000; }
  .stat-label { font-size:12px; color:#555; margin-top:4px; }

  .section { max-width:860px; margin:0 auto; padding:50px 24px; }
  .section-title { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:#fff; margin-bottom:8px; }
  .section-sub { font-size:13px; color:#555; margin-bottom:28px; }

  .features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .feature-card { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:14px; padding:20px; transition:border-color .2s; }
  .feature-card:hover { border-color:#cc000044; }
  .feature-icon { font-size:26px; margin-bottom:10px; }
  .feature-title { font-size:14px; font-weight:600; color:#fff; margin-bottom:6px; }
  .feature-desc { font-size:12px; color:#555; line-height:1.6; }

  .team-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .team-card { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:14px; padding:20px; text-align:center; transition:border-color .2s; }
  .team-card:hover { border-color:#cc000044; }
  .team-avatar { width:56px; height:56px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; }
  .team-name { font-size:14px; font-weight:600; color:#fff; margin-bottom:4px; }
  .team-role { font-size:12px; color:#555; }

  .contact-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .contact-card { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:14px; padding:20px; text-align:center; transition:border-color .2s; text-decoration:none; display:block; }
  .contact-card:hover { border-color:#cc000044; }
  .contact-icon { font-size:26px; margin-bottom:8px; }
  .contact-title { font-size:13px; font-weight:600; color:#fff; margin-bottom:4px; }
  .contact-val { font-size:12px; color:#555; }

  footer { background:#0d0d0d; border-top:1px solid #1a1a1a; text-align:center; padding:20px; font-size:12px; color:#333; }
  footer span { color:#cc0000; }

  @media(max-width:768px) {
    .features-grid { grid-template-columns:1fr 1fr; }
    .team-grid { grid-template-columns:1fr 1fr; }
    .contact-grid { grid-template-columns:1fr; }
    .nav-links { display:none; }
  }
  @media(max-width:480px) {
    .features-grid { grid-template-columns:1fr; }
    .team-grid { grid-template-columns:1fr; }
  }
</style>
</head>
