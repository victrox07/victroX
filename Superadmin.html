<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VictroX – Super Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Inter',sans-serif; color:#e0e0e0; }

  /* LOGIN */
  #loginPage {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#000;
    background-image: radial-gradient(ellipse 60% 50% at 50% 0%, #cc000018 0%, transparent 60%);
  }
  .login-container { width:100%; max-width:400px; padding:24px; }
  .logo { text-align:center; margin-bottom:16px; }
  .logo img { width:130px; height:130px; object-fit:contain; }
  .super-tag { text-align:center; margin-bottom:18px; }
  .super-tag span { background:#1a0a0a; border:1px solid #cc000066; color:#ff4444; padding:5px 16px; border-radius:20px; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .card { background:#0d0d0d; border:1px solid #1f1f1f; border-radius:18px; padding:28px 24px; box-shadow:0 0 60px #cc000020; }
  .card-title { font-size:18px; font-weight:700; color:#f0f0f0; margin-bottom:4px; }
  .card-sub { font-size:13px; color:#444; margin-bottom:22px; }
  label { display:block; font-size:13px; font-weight:500; color:#888; margin-bottom:6px; }
  input { width:100%; background:#111; border:1px solid #1f1f1f; border-radius:8px; padding:12px 14px; color:#f0f0f0; font-size:14px; font-family:'Inter',sans-serif; outline:none; margin-bottom:14px; transition:border-color .2s; }
  input:focus { border-color:#cc0000; }
  input::placeholder { color:#2a2a2a; }
  .error-msg { background:#1a0a0a; border:1px solid #cc000044; color:#ff4444; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
  .btn-login { width:100%; background:linear-gradient(90deg,#cc0000,#ff3333); color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .2s; }
  .btn-login:hover { opacity:.88; }

  /* PANEL */
  #panelPage { display:none; min-height:100vh; background:#0a0a0f; }
  .admin-layout { display:flex; min-height:100vh; }

  .sidebar { width:220px; background:#0d0d12; border-right:1px solid #1a1a24; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .3s; }
  .sidebar-logo { padding:14px 16px; border-bottom:1px solid #1a1a24; display:flex; align-items:center; gap:10px; }
  .sidebar-logo img { width:32px; height:32px; object-fit:contain; }
  .sidebar-logo span { font-size:15px; font-weight:700; color:#fff; }
  .sidebar-logo span em { color:#cc0000; font-style:normal; }
  .super-badge { margin:0 8px 8px; background:#1a0a0a; border:1px solid #cc000044; color:#ff4444; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; text-align:center; }
  .nav-label { font-size:10px; font-weight:600; color:#333; text-transform:uppercase; letter-spacing:1px; padding:14px 16px 6px; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:10px 16px; color:#555; font-size:14px; font-weight:500; cursor:pointer; border-radius:8px; margin:2px 8px; transition:background .2s, color .2s; }
  .nav-item:hover { background:#16161f; color:#ccc; }
  .nav-item.active { background:#1a0a0a; color:#cc0000; border-left:3px solid #cc0000; }
  .sidebar-footer { margin-top:auto; padding:12px; border-top:1px solid #1a1a24; font-size:11px; color:#333; text-align:center; }

  .hamburger { display:none; background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
  .overlay { display:none; position:fixed; inset:0; background:#00000088; z-index:99; }

  .main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
  .topbar { background:#0d0d12; border-bottom:1px solid #1a1a24; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar h1 { font-size:20px; font-weight:700; color:#fff; }
  .topbar-right { display:flex; align-items:center; gap:10px; }
  .time { font-size:12px; color:#444; }
  .super-admin-badge { background:#1a0a0a; border:1px solid #cc000066; color:#ff4444; padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; }
  .btn-logout { background:transparent; border:1px solid #1f1f1f; color:#555; padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-logout:hover { color:#cc0000; border-color:#cc0000; }

  .page { display:none; padding:20px; }
  .page.active { display:block; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
  .stat-card { background:#0d0d12; border:1px solid #1a1a24; border-radius:14px; padding:18px; display:flex; align-items:center; gap:14px; transition:border-color .2s; }
  .stat-card:hover { border-color:#cc000044; }
  .stat-icon { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .stat-num { font-size:26px; font-weight:700; color:#fff; line-height:1.1; margin-bottom:3px; }
  .stat-label { font-size:12px; color:#555; }

  /* TABLE */
  .table-card { background:#0d0d12; border:1px solid #1a1a24; border-radius:14px; overflow:hidden; margin-bottom:20px; }
  .table-header { padding:14px 18px; border-bottom:1px solid #1a1a24; display:flex; align-items:center; justify-content:space-between; }
  .table-header span { font-size:14px; font-weight:600; color:#fff; }
  .btn-sm { background:#cc0000; color:#fff; border:none; padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-sm.green { background:#00c453; }
  .btn-sm.gray { background:#333; }
  .btn-sm.orange { background:#cc6600; }
  table { width:100%; border-collapse:collapse; }
  th { font-size:11px; font-weight:600; color:#444; text-transform:uppercase; letter-spacing:.5px; padding:10px 18px; text-align:left; border-bottom:1px solid #1a1a24; }
  td { padding:11px 18px; font-size:13px; color:#ccc; border-bottom:1px solid #111; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#0f0f16; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-active { background:#00c45322; color:#00c453; border:1px solid #00c45344; }
  .badge-banned { background:#cc000022; color:#cc0000; border:1px solid #cc000044; }
  .badge-online { background:#00c45322; color:#00c453; border:1px solid #00c45344; }
  .badge-offline { background:#33333322; color:#666; border:1px solid #33333344; }
  .action-btns { display:flex; gap:6px; flex-wrap:wrap; }

  /* ADD ADMIN FORM */
  .form-card { background:#0d0d12; border:1px solid #1a1a24; border-radius:14px; padding:20px; margin-bottom:20px; }
  .form-card h3 { font-size:15px; font-weight:600; color:#fff; margin-bottom:16px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .form-input { width:100%; background:#111; border:1px solid #1f1f1f; border-radius:8px; padding:11px 14px; color:#f0f0f0; font-size:13px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:#cc0000; }
  .form-input::placeholder { color:#2a2a2a; }
  .btn-add { background:linear-gradient(90deg,#cc0000,#ff3333); color:#fff; border:none; padding:11px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }

  /* ACTIVITY LOG */
  .log-item { background:#0d0d12; border:1px solid #1a1a24; border-radius:10px; padding:14px 18px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
  .log-icon { font-size:18px; width:24px; text-align:center; }
  .log-info { flex:1; }
  .log-text { font-size:13px; color:#ccc; margin-bottom:2px; }
  .log-meta { font-size:11px; color:#444; }

  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .overlay.open { display:block; }
    .main { margin-left:0; }
    .hamburger { display:block; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
    .time { display:none; }
    .form-grid { grid-template-columns:1fr; }
    td, th { padding:8px 10px; font-size:12px; }
  }
  @media(max-width:480px) {
    .stats-grid { grid-template-columns:1fr; }
  }
</style>
</head>
